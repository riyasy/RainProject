name: Build

on:
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: windows-latest
            platform: x64
            arch: x64
            out_dir: x64/Release/
          - runner: windows-11-arm
            platform: ARM64
            arch: ARM64
            out_dir: ARM64/Release/
          - runner: windows-latest
            platform: Win32
            arch: x86
            out_dir: Win32/Release/

    runs-on: ${{ matrix.runner }}
    name: Build (${{ matrix.arch }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build let-it-rain
        run: |
          msbuild Src\let-it-rain\let-it-rain.vcxproj /p:Configuration=Release /p:Platform=${{ matrix.platform }} /p:PlatformToolset=v143

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: let-it-rain-${{ matrix.arch }}
          path: Src/let-it-rain/${{ matrix.out_dir }}